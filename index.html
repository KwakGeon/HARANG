<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚾ 하랑 타이거즈 상대전적</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background: #f0f2f5; }
    .header-bar { background: #1a2e4a; color: #fff; padding: 1rem 1.5rem; border-radius: 12px; }
    .stat-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .nav-tabs .nav-link { color: #555; font-weight: 500; }
    .nav-tabs .nav-link.active { color: #1a2e4a; font-weight: 700; border-bottom: 3px solid #1a2e4a; }
    .badge-win  { background: #28a745; color: #fff; }
    .badge-lose { background: #dc3545; color: #fff; }
    .badge-draw { background: #ffc107; color: #333; }
    .result-badge { padding: 3px 10px; border-radius: 20px; font-size: .8rem; font-weight: 600; }
    #loading { text-align: center; padding: 60px; color: #888; }
    th[data-sort] { cursor: pointer; user-select: none; white-space: nowrap; }
    th[data-sort]:hover { background: #293e56 !important; }
  </style>
</head>
<body>
<div class="container-fluid px-3 py-3" style="max-width:1200px; margin:auto">

  <!-- 헤더 -->
  <div class="header-bar d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
    <div>
      <h4 class="mb-0">⚾ 하랑 타이거즈 상대전적</h4>
      <small id="updated" class="opacity-75"></small>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <select id="filterSeason" class="form-select form-select-sm" style="width:auto; min-width:110px"></select>
      <select id="filterLeague" class="form-select form-select-sm" style="width:auto; min-width:120px"></select>
    </div>
  </div>

  <div id="loading">⏳ 데이터 불러오는 중...</div>
  <div id="app" style="display:none">

    <!-- 요약 지표 -->
    <div class="row g-2 mb-3" id="statsRow"></div>

    <!-- 탭 -->
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><button class="nav-link active" data-tab="summary">📊 상대전적 요약</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="history">📋 경기 히스토리</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="charts">📈 차트 분석</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="mvp">🏆 MVP</button></li>
    </ul>

    <div id="tabSummary"></div>
    <div id="tabHistory" style="display:none"></div>
    <div id="tabCharts"  style="display:none"></div>
    <div id="tabMvp"     style="display:none"></div>

  </div>
</div>

<script>
let allGames = [];
let mvpData  = null;
let charts = {};
let histSort = { col: '날짜', dir: -1 };  // 기본: 날짜 내림차순

/* ── 데이터 로드 ── */
fetch('games_data.json')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
    return r.json();
  })
  .then(data => {
    allGames = data.games;
    mvpData  = data.mvp_stats || null;
    document.getElementById('updated').textContent = '마지막 업데이트: ' + data.generated_at;
    try {
      initFilters();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = '';
      render();
      renderMVP();
    } catch(e) {
      document.getElementById('loading').innerHTML =
        '<div class="alert alert-warning"><b>렌더링 오류:</b> ' + e.message + '<br><pre>' + e.stack + '</pre></div>';
    }
  })
  .catch((err) => {
    document.getElementById('loading').innerHTML =
      '<div class="alert alert-danger"><b>Fetch 오류:</b> ' + (err && err.message ? err.message : String(err)) + '</div>';
  });

/* ── 필터 초기화 ── */
function initFilters() {
  const seasons = [...new Set(allGames.map(g => g['시즌']))].sort().reverse();
  const leagues = [...new Set(allGames.map(g => g['리그']).filter(Boolean))].sort();

  const ss = document.getElementById('filterSeason');
  ss.innerHTML = '<option value="all">전체 시즌</option>' +
    seasons.map(s => `<option value="${s}">${s}시즌</option>`).join('');

  // 현재 년도를 기본값으로 설정
  const curYear = new Date().getFullYear();
  if (seasons.includes(curYear)) ss.value = String(curYear);

  const sl = document.getElementById('filterLeague');
  sl.innerHTML = '<option value="all">전체 리그</option>' +
    leagues.map(l => `<option value="${escHtml(l)}">${escHtml(l)}</option>`).join('');

  ss.addEventListener('change', render);
  sl.addEventListener('change', render);
}

function getFiltered() {
  const season = document.getElementById('filterSeason').value;
  const league = document.getElementById('filterLeague').value;
  return allGames.filter(g =>
    (season === 'all' || String(g['시즌']) === season) &&
    (league === 'all' || g['리그'] === league)
  );
}

/* ── 전적 계산 ── */
function calcSummary(games) {
  const map = {};
  for (const g of games) {
    const k = g['상대팀'];
    if (!map[k]) map[k] = { 경기수:0, 승:0, 패:0, 무:0, 우득:0, 상득:0 };
    const t = map[k];
    t.경기수++;
    if (g['결과'].includes('승')) t.승++;
    else if (g['결과'].includes('패')) t.패++;
    else t.무++;
    t.우득 += g['우리팀_점수'] || 0;
    t.상득 += g['상대팀_점수'] || 0;
  }
  return Object.entries(map).map(([팀, v]) => ({
    팀,
    경기수: v.경기수,
    승: v.승, 패: v.패, 무: v.무,
    승률: +(v.승 / v.경기수 * 100).toFixed(1),
    평균득점: +(v.우득 / v.경기수).toFixed(2),
    평균실점: +(v.상득 / v.경기수).toFixed(2),
    득실차: v.우득 - v.상득,
  })).sort((a, b) => b.경기수 - a.경기수);
}

/* ── 전체 렌더 ── */
function render() {
  const games = getFiltered();
  renderStats(games);
  renderSummary(games);
  renderHistory(games);
  renderCharts(games);
}

/* ── 요약 지표 ── */
function renderStats(games) {
  const wins   = games.filter(g => g['결과'].includes('승')).length;
  const losses = games.filter(g => g['결과'].includes('패')).length;
  const draws  = games.filter(g => g['결과'] === '무').length;
  const rate   = games.length ? (wins / games.length * 100).toFixed(1) : 0;

  const items = [
    { label:'총 경기', value: games.length, color:'primary' },
    { label:'승',      value: wins,         color:'success' },
    { label:'패',      value: losses,       color:'danger'  },
    { label:'무',      value: draws,        color:'warning' },
    { label:'승률',    value: rate + '%',   color:'info'    },
  ];
  document.getElementById('statsRow').innerHTML = items.map(i => `
    <div class="col">
      <div class="card stat-card text-center border-${i.color} border-2">
        <div class="card-body py-2">
          <div class="stat-value text-${i.color}">${i.value}</div>
          <div class="text-muted small">${i.label}</div>
        </div>
      </div>
    </div>`).join('');
}

/* ── 상대전적 요약 탭 ── */
function renderSummary(games) {
  const summary = calcSummary(games);
  document.getElementById('tabSummary').innerHTML = `
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>상대팀</th><th class="text-center">경기수</th>
                <th class="text-center text-success">승</th>
                <th class="text-center text-danger">패</th>
                <th class="text-center text-warning">무</th>
                <th class="text-center">승률</th>
                <th class="text-center">평균득점</th>
                <th class="text-center">평균실점</th>
                <th class="text-center">득실차</th>
              </tr>
            </thead>
            <tbody>
              ${summary.map(r => {
                const rowCls = r.승률 >= 60 ? 'table-success' : r.승률 <= 40 ? 'table-danger' : '';
                const diffCls = r.득실차 >= 0 ? 'text-success' : 'text-danger';
                const sign = r.득실차 > 0 ? '+' : '';
                return `<tr class="${rowCls}">
                  <td class="fw-bold">${escHtml(r.팀)}</td>
                  <td class="text-center">${r.경기수}</td>
                  <td class="text-center fw-bold text-success">${r.승}</td>
                  <td class="text-center fw-bold text-danger">${r.패}</td>
                  <td class="text-center fw-bold">${r.무}</td>
                  <td class="text-center">${r.승률}%</td>
                  <td class="text-center">${r.평균득점}</td>
                  <td class="text-center">${r.평균실점}</td>
                  <td class="text-center fw-bold ${diffCls}">${sign}${r.득실차}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="card border-0 shadow-sm p-3">
      <canvas id="winRateChart"></canvas>
    </div>`;

  if (charts.winRate) charts.winRate.destroy();
  charts.winRate = new Chart(document.getElementById('winRateChart'), {
    type: 'bar',
    data: {
      labels: summary.map(r => r.팀),
      datasets: [{
        label: '승률(%)',
        data: summary.map(r => r.승률),
        backgroundColor: summary.map(r =>
          r.승률 >= 60 ? '#28a745' : r.승률 <= 40 ? '#dc3545' : '#ffc107'),
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        title: { display: true, text: '상대팀별 승률 (%)', font: { size: 14 } }
      },
      scales: { x: { min: 0, max: 100, ticks: { callback: v => v + '%' } } }
    }
  });
}

/* ── 경기 히스토리 탭 ── */

// 날짜 정렬용 숫자 키 (시즌*10000 + 월*100 + 일)
function _dateKey(g) {
  const m = g['날짜'].match(/(\d+)월(\d+)일/);
  return m ? g['시즌'] * 10000 + parseInt(m[1]) * 100 + parseInt(m[2]) : 0;
}

// 결과 정렬 순서 (승 > 무 > 패)
function _resultRank(r) {
  return r.includes('승') ? 2 : r.includes('무') ? 1 : 0;
}

// 히스토리 테이블 컬럼 정의
const _HIST_COLS = [
  { key: '날짜',   label: '날짜',   cls: '' },
  { key: '시즌',   label: '시즌',   cls: 'text-center' },
  { key: '상대팀', label: '상대팀', cls: '' },
  { key: '점수',   label: '점수',   cls: 'text-center' },
  { key: '득실차', label: '득실차', cls: 'text-center' },
  { key: '결과',   label: '결과',   cls: 'text-center' },
  { key: null,     label: '리그',   cls: '' },
  { key: null,     label: '구장',   cls: '' },
  { key: null,     label: '',       cls: '' },
];

function _histSortBy(col) {
  if (histSort.col === col) histSort.dir *= -1;
  else { histSort.col = col; histSort.dir = -1; }
  _renderHistHead();
  _renderHistBody(getFiltered(), document.getElementById('oppFilter')?.value || 'all');
}

function _renderHistHead() {
  const thead = document.getElementById('histHead');
  if (!thead) return;
  thead.innerHTML = '<tr>' + _HIST_COLS.map(c => {
    if (!c.key) return `<th class="${c.cls}">${c.label}</th>`;
    const active = histSort.col === c.key;
    const icon = active ? (histSort.dir === 1 ? ' ↑' : ' ↓') : ' <span style="opacity:.25">↕</span>';
    return `<th class="${c.cls}" data-sort="${c.key}">${c.label}${icon}</th>`;
  }).join('') + '</tr>';
  // 헤더 클릭 이벤트 (innerHTML 교체 후 재등록)
  thead.querySelectorAll('th[data-sort]').forEach(th =>
    th.addEventListener('click', () => _histSortBy(th.dataset.sort))
  );
}

function _renderHistBody(games, opp) {
  const tbody = document.getElementById('histBody');
  if (!tbody) return;

  let rows = opp === 'all' ? [...games] : games.filter(g => g['상대팀'] === opp);
  const col = histSort.col, dir = histSort.dir;

  rows.sort((a, b) => {
    let va, vb;
    if      (col === '날짜')   { va = _dateKey(a);                          vb = _dateKey(b); }
    else if (col === '시즌')   { va = a['시즌'];                             vb = b['시즌']; }
    else if (col === '상대팀') { va = a['상대팀'];                           vb = b['상대팀']; }
    else if (col === '점수')   { va = a['우리팀_점수'] || 0;                 vb = b['우리팀_점수'] || 0; }
    else if (col === '득실차') { va = (a['우리팀_점수']||0)-(a['상대팀_점수']||0); vb = (b['우리팀_점수']||0)-(b['상대팀_점수']||0); }
    else if (col === '결과')   { va = _resultRank(a['결과']);                vb = _resultRank(b['결과']); }
    else                       { va = _dateKey(a);                          vb = _dateKey(b); }
    if (typeof va === 'string') return va.localeCompare(vb, 'ko') * dir;
    return (va - vb) * dir;
  });

  const cnt = document.getElementById('historyCount');
  if (cnt) cnt.textContent = `(${rows.length}경기)`;

  tbody.innerHTML = rows.map((g, idx) => {
    const r     = g['결과'];
    const bcls  = r.includes('승') ? 'badge-win' : r.includes('패') ? 'badge-lose' : 'badge-draw';
    const diff  = (g['우리팀_점수'] || 0) - (g['상대팀_점수'] || 0);
    const diffCls = diff > 0 ? 'text-success fw-bold' : diff < 0 ? 'text-danger fw-bold' : 'text-muted';
    const diffStr = diff > 0 ? `+${diff}` : String(diff);
    const best  = (g['best']  || []).filter(s => s !== '상세 기록 미입력');
    const worst = (g['worst'] || []).filter(s => s !== '상세 기록 미입력');
    const hasReview = best.length > 0 || worst.length > 0;
    const rid = `rev_${idx}`;

    const bestHtml  = best.map(s  => `<li>✅ ${escHtml(s)}</li>`).join('');
    const worstHtml = worst.map(s => `<li>⚠️ ${escHtml(s)}</li>`).join('');

    const reviewBtn = hasReview
      ? `<button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="
           const el=document.getElementById('${rid}');
           const v=el.style.display!=='none';
           el.style.display=v?'none':'';
           this.textContent=v?'📋 리뷰 보기':'닫기';">📋 리뷰 보기</button>`
      : '';

    const reviewRow = hasReview ? `
      <tr id="${rid}" style="display:none">
        <td colspan="${_HIST_COLS.length}" class="p-0">
          <div class="px-3 py-2" style="background:#f8f9fa">
            <div class="row g-2">
              ${bestHtml ? `<div class="col-md-6"><div class="p-2 rounded" style="background:#f0fff4">
                <div class="fw-bold text-success mb-1 small">👍 잘한 점</div>
                <ul class="mb-0 ps-3 small">${bestHtml}</ul>
              </div></div>` : ''}
              ${worstHtml ? `<div class="col-md-6"><div class="p-2 rounded" style="background:#fff5f5">
                <div class="fw-bold text-danger mb-1 small">👎 아쉬운 점</div>
                <ul class="mb-0 ps-3 small">${worstHtml}</ul>
              </div></div>` : ''}
            </div>
          </div>
        </td>
      </tr>` : '';

    return `
      <tr>
        <td class="small text-nowrap">${escHtml(g['날짜'])}</td>
        <td class="text-center small">${g['시즌']}</td>
        <td class="fw-bold">${escHtml(g['상대팀'])}</td>
        <td class="text-center fw-bold">${g['우리팀_점수']} - ${g['상대팀_점수']}</td>
        <td class="text-center ${diffCls}">${diffStr}</td>
        <td class="text-center"><span class="result-badge ${bcls}">${escHtml(r)}</span></td>
        <td class="small">${escHtml(g['리그'] || '')}</td>
        <td class="small text-muted">${escHtml(g['구장'] || '')}</td>
        <td class="text-end">${reviewBtn}</td>
      </tr>${reviewRow}`;
  }).join('');
}

function renderHistory(games) {
  const opponents = [...new Set(games.map(g => g['상대팀']))].sort();

  document.getElementById('tabHistory').innerHTML = `
    <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
      <label class="fw-bold text-nowrap">상대팀</label>
      <select id="oppFilter" class="form-select form-select-sm" style="width:auto; min-width:150px">
        <option value="all">전체</option>
        ${opponents.map(o => `<option value="${escHtml(o)}">${escHtml(o)}</option>`).join('')}
      </select>
      <span id="historyCount" class="text-muted small"></span>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover table-sm align-middle mb-0">
          <thead class="table-dark" id="histHead"></thead>
          <tbody id="histBody"></tbody>
        </table>
      </div>
    </div>`;

  _renderHistHead();
  _renderHistBody(games, 'all');

  document.getElementById('oppFilter').addEventListener('change', e =>
    _renderHistBody(getFiltered(), e.target.value)
  );
}

/* ── 차트 분석 탭 ── */
function renderCharts(games) {
  const summary = calcSummary(games).slice(0, 12);

  document.getElementById('tabCharts').innerHTML = `
    <div class="row g-3">
      <div class="col-lg-6"><div class="card border-0 shadow-sm p-3"><canvas id="scoreChart"></canvas></div></div>
      <div class="col-lg-6"><div class="card border-0 shadow-sm p-3"><canvas id="wldChart"></canvas></div></div>
    </div>`;

  if (charts.score) charts.score.destroy();
  charts.score = new Chart(document.getElementById('scoreChart'), {
    type: 'bar',
    data: {
      labels: summary.map(r => r.팀),
      datasets: [
        { label: '평균 득점', data: summary.map(r => r.평균득점), backgroundColor: '#28a745' },
        { label: '평균 실점', data: summary.map(r => r.평균실점), backgroundColor: '#dc3545' },
      ]
    },
    options: {
      responsive: true,
      plugins: { title: { display: true, text: '상대팀별 평균 득점 vs 실점', font: { size: 14 } } }
    }
  });

  if (charts.wld) charts.wld.destroy();
  charts.wld = new Chart(document.getElementById('wldChart'), {
    type: 'bar',
    data: {
      labels: summary.map(r => r.팀),
      datasets: [
        { label: '승', data: summary.map(r => r.승), backgroundColor: '#28a745' },
        { label: '무', data: summary.map(r => r.무), backgroundColor: '#ffc107' },
        { label: '패', data: summary.map(r => r.패), backgroundColor: '#dc3545' },
      ]
    },
    options: {
      responsive: true,
      plugins: { title: { display: true, text: '상대팀별 승/무/패 구성', font: { size: 14 } } },
      scales: { x: { stacked: true }, y: { stacked: true } }
    }
  });
}

/* ── 탭 전환 ── */
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-tab]');
  if (!btn) return;
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['summary','history','charts','mvp'].forEach(t => {
    const el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    el.style.display = t === btn.dataset.tab ? '' : 'none';
  });
});

/* ── MVP 탭 ── */
let _mvpBatterMap = {};
let _mvpPopoverListenerAdded = false;

function renderMVP() {
  const el = document.getElementById('tabMvp');
  if (!el) return;

  if (!mvpData) {
    el.innerHTML = '<div class="alert alert-secondary mt-2">MVP 통계 데이터가 없습니다.</div>';
    return;
  }

  const { season, total_games, batter, pitcher } = mvpData;
  const medals = ['🥇', '🥈', '🥉'];
  const 규정이닝 = total_games;
  const 규정타석 = Math.ceil(total_games * 1.5);

  // 타율 툴팁용 데이터 맵 갱신
  _mvpBatterMap = Object.fromEntries(batter.map(b => [b.name, b]));

  function sortAll(arr, key, asc) {
    return [...arr].sort((a, b) => asc ? a[key] - b[key] : b[key] - a[key]);
  }

  // fmtFn: 배지 값 포맷 함수 | extraFn: 부가정보 | showTooltip: 타율 툴팁 여부
  function awardCard(title, sorted, key, unit, note, extraFn, fmtFn, showTooltip) {
    unit = unit || '';
    const headerNote = note ? ` <small class="opacity-75 fw-normal">${note}</small>` : '';
    if (!sorted.length) {
      return `<div class="col-md-6 col-xl-4">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-header bg-secondary text-white fw-bold py-2">${title}${headerNote}</div>
          <div class="card-body text-muted small py-2">규정 미달 선수 없음</div>
        </div></div>`;
    }

    function renderRow(p, rank, medal) {
      const lbl = medal
        ? `<span style="font-size:1.4rem;width:2.2rem;flex-shrink:0">${medal}</span>`
        : `<span class="text-muted" style="width:2.2rem;flex-shrink:0;font-size:.82rem">${rank}위</span>`;
      const sub  = extraFn ? extraFn(p) : `${p['경기']}경기`;
      const val  = fmtFn   ? fmtFn(p[key]) : p[key];
      const info = showTooltip
        ? `<button class="mvp-avg-info btn btn-link p-0 ms-1 text-muted"
                   data-mvp-name="${escHtml(p.name)}"
                   style="font-size:.82rem;line-height:1;vertical-align:middle">ℹ️</button>`
        : '';
      return `<div class="d-flex align-items-center py-2 border-bottom">
        ${lbl}
        <div class="flex-grow-1 fw-bold ms-1">${escHtml(p.name)}${info}</div>
        <div class="text-end">
          <span class="badge bg-primary rounded-pill">${val}${unit}</span>
          <div class="text-muted" style="font-size:.72rem">${sub}</div>
        </div>
      </div>`;
    }

    const top3 = sorted.slice(0, 3);
    const rest = sorted.slice(3);
    const top3Html = top3.map((p, i) => renderRow(p, i + 1, medals[i])).join('');
    const restHtml = rest.length
      ? `<details><summary style="cursor:pointer;list-style:none;outline:none"
             class="text-muted small py-2 ps-1">▼ ${rest.length}명 더 보기</summary>
           <div>${rest.map((p, i) => renderRow(p, i + 4, null)).join('')}</div>
         </details>`
      : '';

    return `<div class="col-md-6 col-xl-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-header bg-dark text-white fw-bold py-2">${title}${headerNote}</div>
        <div class="card-body py-2">${top3Html}${restHtml}</div>
      </div></div>`;
  }

  const fmt3   = v => (typeof v === 'number' ? v.toFixed(3) : v);
  const fmtPct = v => (typeof v === 'number' ? v.toFixed(1) : v);
  const pitExtra = p => `${p['이닝']}이닝 · ${p['경기']}경기`;

  const pitERA = sortAll(pitcher, '방어율', true);
  const pitK   = sortAll(pitcher, '삼진',   false);
  const batAVG = sortAll(batter,  '타율',   false);
  const batRBI = sortAll(batter,  '타점',   false);
  const batOPS = sortAll(batter,  'OPS',    false);
  const batSB  = sortAll(batter,  '도루',   false);
  const batSO  = sortAll(batter,  '삼진',   true);
  const batATT = sortAll(batter,  '출석률', false);

  el.innerHTML = `
    <div class="alert alert-info d-flex align-items-center gap-2 mb-3 mt-1">
      <span style="font-size:1.3rem">🏆</span>
      <div>
        <strong>${season}시즌 MVP 통계</strong> &mdash; 총 ${total_games}경기 기준<br>
        <small>투수 규정이닝 ${규정이닝}이닝 이상 &nbsp;·&nbsp; 타자 규정타석 ${규정타석}타석 이상</small>
      </div>
    </div>

    <h5 class="fw-bold text-secondary mb-2">⚾ 투수 부문</h5>
    <div class="row g-3 mb-4">
      ${awardCard('방어율 (ERA)', pitERA, '방어율', '', '낮을수록 Good', pitExtra, fmt3)}
      ${awardCard('탈삼진',       pitK,   '삼진',   '개', null,          pitExtra)}
    </div>

    <h5 class="fw-bold text-secondary mb-2">🏏 타자 부문</h5>
    <div class="row g-3">
      ${awardCard('타율',      batAVG, '타율',   '',  '실책출루 포함', null, fmt3, true)}
      ${awardCard('타점',      batRBI, '타점',   '점')}
      ${awardCard('OPS',       batOPS, 'OPS',    '',  null,            null, fmt3)}
      ${awardCard('도루',      batSB,  '도루',   '개')}
      ${awardCard('최소 삼진', batSO,  '삼진',   '개', '낮을수록 Good')}
      ${awardCard('출석왕',    batATT, '출석률', '%',  null,            null, fmtPct)}
    </div>`;

  initMVPPopovers();
}

function initMVPPopovers() {
  if (typeof bootstrap === 'undefined') return;

  document.querySelectorAll('.mvp-avg-info').forEach(btn => {
    const old = bootstrap.Popover.getInstance(btn);
    if (old) old.dispose();

    const name = btn.getAttribute('data-mvp-name');
    const p = _mvpBatterMap[name];
    if (!p) return;

    const reg     = (p['정규타율'] || 0).toFixed(3);
    const withErr = (p['타율']     || 0).toFixed(3);
    const records = p['실책_기록'] || [];

    let content = `<div style="min-width:190px">
      <table class="table table-sm table-borderless mb-1 small">
        <tr><td class="py-0 pe-3 text-muted">정규타율</td>
            <td class="py-0 fw-bold">${reg}</td></tr>
        <tr><td class="py-0 pe-3 text-muted">실책포함</td>
            <td class="py-0 fw-bold text-primary">${withErr}</td></tr>
      </table>`;

    if (records.length) {
      content += `<hr class="my-1"><div class="small fw-bold mb-1">실책 기록</div>`;
      records.forEach(r => {
        const plays = (r['플레이'] || []).map(escHtml).join(', ');
        content += `<div class="small mb-1">${escHtml(r['날짜'])} vs <strong>${escHtml(r['상대팀'])}</strong><br>
          <span class="text-muted">${plays}</span></div>`;
      });
    } else {
      content += `<div class="small text-muted mt-1">실책 출루 없음</div>`;
    }
    content += `</div>`;

    new bootstrap.Popover(btn, {
      html: true,
      content: content,
      trigger: 'click',
      placement: 'auto',
      sanitize: false,
    });
  });

  if (!_mvpPopoverListenerAdded) {
    _mvpPopoverListenerAdded = true;
    document.addEventListener('click', e => {
      if (!e.target.closest('.mvp-avg-info') && !e.target.closest('.popover')) {
        document.querySelectorAll('.mvp-avg-info').forEach(btn => {
          const inst = bootstrap.Popover.getInstance(btn);
          if (inst) inst.hide();
        });
      }
    });
  }
}

/* ── XSS 방지 ── */
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
