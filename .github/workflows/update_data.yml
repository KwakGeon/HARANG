name: Update Game Data

on:
  schedule:
    - cron: '0 15 * * 1'  # 매주 월요일 00:00 KST (UTC 15:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Generate game data
        run: python generate_data.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-update game data'
          file_pattern: 'data/games.json'

      - name: Trigger Netlify deploy
        run: curl -X POST https://api.netlify.com/build_hooks/6a599c25b96324471c432eef
